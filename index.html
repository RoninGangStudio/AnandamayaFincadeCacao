<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anandamaya | Finca de Cacao de Altura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=JetBrains+Mono:wght@400;700&display=swap">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Outfit", "ui-sans-serif", "system-ui", "sans-serif"],
                        serif: ["Playfair Display", "ui-serif", "Georgia", "serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                    colors: {
                        'cacao-blue': '#2296F3',
                        'cacao-pink': '#FF00FF',
                        'cacao-orange': '#FF8C00',
                        'cacao-purple': '#700070',
                        'cacao-black': '#1A1A1A',
                        'cacao-pulp': '#F5F2ED',
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        body {
            background-color: #F5F2ED;
            color: #1A1A1A;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }
        .text-outline {
            -webkit-text-stroke: 1.5px currentColor;
            color: transparent;
        }
        .bg-noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
        }
        .splat-bg {
            background: radial-gradient(circle at center, #FF8C00 0%, transparent 70%);
        }
        .archive-card {
            position: relative;
            overflow: hidden;
            transition: all 0.7s;
            clip-path: polygon(4% 0, 100% 1%, 96% 100%, 0 99%);
        }
        ::selection {
            background-color: #FF00FF;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, useSpring, AnimatePresence } = Motion;

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) lucide.createIcons();
            }, []);
            return <i ref={iconRef} data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Logo = ({ className }) => (
            <svg viewBox="0 0 100 100" className={className} fill="currentColor">
                <circle cx="50" cy="50" r="48" fill="black" />
                <path 
                    d="M50 20C40 20 30 25 25 35C20 45 20 55 25 65C30 75 40 80 50 80C60 80 70 75 75 65C80 55 80 45 75 35C70 25 60 20 50 20Z" 
                    fill="white" 
                />
                <path d="M50 35L55 50L50 65L45 50Z" fill="black" />
                <path d="M35 50L50 45L65 50L50 55Z" fill="black" />
            </svg>
        );

        const SectionLabel = ({ children, color = "text-cacao-pink" }) => (
            <div className="flex items-center gap-4 mb-6">
                <div className={`h-[2px] w-8 bg-current ${color}`} />
                <span className={`font-mono text-[10px] font-black tracking-[0.4em] uppercase ${color}`}>{children}</span>
            </div>
        );

        const App = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            useEffect(() => {
                const handleMove = (e) => setMousePos({ x: e.clientX, y: e.clientY });
                window.addEventListener('mousemove', handleMove);
                lucide.createIcons();
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            const springX = useSpring(mousePos.x, { damping: 25, stiffness: 150 });
            const springY = useSpring(mousePos.y, { damping: 25, stiffness: 150 });

            const { scrollY } = useScroll();
            const yHero = useTransform(scrollY, [0, 800], [0, 200]);

            return (
                <div className="relative lg:cursor-none overflow-x-hidden">
                    <motion.div 
                        style={{ x: springX, y: springY, translateX: '-50%', translateY: '-50%' }}
                        className="fixed top-0 left-0 w-16 h-16 border-2 border-cacao-pink rounded-full z-[9999] pointer-events-none mix-blend-difference hidden lg:flex items-center justify-center font-black text-[8px] text-cacao-pink"
                    >
                        ANANDAMAYA
                    </motion.div>

                    <div className="bg-noise" />

                    <main>
                        {/* HERO */}
                        <section className="relative min-h-screen flex items-center justify-center bg-cacao-blue overflow-hidden pt-20 pb-12">
                            <motion.div style={{ y: yHero }} className="absolute inset-0 z-0 opacity-30 splat-bg blur-3xl scale-150 rotate-12" />
                            <div className="relative z-10 text-center px-4 container mx-auto">
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1.2 }}>
                                    <Logo className="w-16 h-16 md:w-20 md:h-20 mx-auto mb-8 bg-white rounded-full p-2 shadow-2xl" />
                                    <div className="font-mono text-white tracking-[0.4em] md:tracking-[0.8em] uppercase text-[10px] md:text-[12px] mb-6 font-black opacity-90 leading-relaxed">
                                        ESENCIA • CACAO • EXPERIENCIA
                                    </div>
                                    <h1 className="text-[14vw] md:text-[10vw] lg:text-[9vw] leading-[0.85] font-black uppercase text-white tracking-tighter mb-10 drop-shadow-[0_20px_40px_rgba(0,0,0,0.5)]">
                                        ANANDAMAYA<br />
                                        <span className="text-[11vw] md:text-[8vw] lg:text-[7vw] text-outline text-white opacity-80">FINCA DE CACAO</span>
                                    </h1>
                                    <div className="max-w-2xl mx-auto border-l-4 md:border-l-8 border-cacao-pink pl-6 md:pl-10 text-left">
                                        <p className="text-white font-black uppercase tracking-tight text-xl md:text-4xl lg:text-5xl leading-tight">
                                            UN ARCHIVO VIVO A 1.200 METROS DE ALTURA.
                                        </p>
                                        <p className="text-white/60 font-mono text-[9px] md:text-[10px] uppercase tracking-[0.3em] font-black mt-6">
                                            Ujarrás • Costa Rica • Uxarrací Archive
                                        </p>
                                    </div>
                                </motion.div>
                            </div>
                        </section>

                        {/* ESENCIA / SECCCION 01 */}
                        <section className="py-40 bg-white relative overflow-hidden">
                            <div className="container mx-auto px-6">
                                <div className="grid lg:grid-cols-12 gap-12 lg:gap-20 items-center">
                                    <div className="lg:col-span-6">
                                        <SectionLabel>Capa 01: Territorio Histórico</SectionLabel>
                                        <h2 className="text-5xl md:text-7xl lg:text-[7.5vw] font-black text-cacao-blue leading-[0.85] tracking-tighter mb-10 uppercase italic">
                                            ESENCIA<br />DENSA.
                                        </h2>
                                        <p className="text-xl md:text-2xl font-serif italic text-stone-600 mb-10 leading-relaxed">
                                            "Ujarrás no es solo un paisaje, es un archivo vivo donde el cacao precede al café como eje económico desde 1709."
                                        </p>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                            <div className="p-6 md:p-8 bg-stone-100 archive-card border-l-4 border-cacao-orange">
                                                <h4 className="font-black uppercase mb-3 text-cacao-blue text-sm md:text-base">Uxarrací</h4>
                                                <p className="text-stone-500 font-medium leading-snug text-sm md:text-base">Originalmente un asentamiento indígena Huetar. En 1575 se estableció como reducción indígena.</p>
                                            </div>
                                            <div className="p-6 md:p-8 bg-stone-100 archive-card border-l-4 border-cacao-pink">
                                                <h4 className="font-black uppercase mb-3 text-cacao-blue text-sm md:text-base">Calicanto</h4>
                                                <p className="text-stone-500 font-medium leading-snug text-sm md:text-base">Ruinas del siglo XVII que hoy son baluarte patrimonial sobre el que se posiciona la finca.</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-6 relative">
                                        <div className="aspect-square bg-cacao-blue rounded-full absolute -top-20 -right-20 opacity-10 blur-3xl" />
                                        <div className="relative z-10 grid grid-cols-2 gap-4">
                                            <img src="https://raw.githubusercontent.com/RoninGangStudio/AnandamayaFincadeCacao/main/foto1.png" className="w-full h-full object-cover rounded-3xl grayscale archive-card" alt="Historia" />
                                            <img src="https://raw.githubusercontent.com/RoninGangStudio/AnandamayaFincadeCacao/main/foto2.png" className="w-full h-full object-cover rounded-3xl mt-12 archive-card" alt="Cacao" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* CACAO / SECCION 02 */}
                        <section className="py-40 bg-cacao-purple text-white relative overflow-hidden">
                            <div className="absolute inset-0 splat-bg opacity-10 rotate-45 scale-150" />
                            <div className="container mx-auto px-6 relative z-10">
                                <SectionLabel color="text-cacao-orange">Capa 02: Memoria Agrícola</SectionLabel>
                                <div className="grid lg:grid-cols-12 gap-12 lg:gap-20 items-end mb-24">
                                    <div className="lg:col-span-8">
                                        <h2 className="text-[12vw] lg:text-[11vw] font-black leading-[0.7] tracking-tighter uppercase italic">TSURU</h2>
                                        <h3 className="text-3xl md:text-5xl font-serif italic text-cacao-orange mt-4">Cacao de Altura (1.200m)</h3>
                                    </div>
                                    <div className="lg:col-span-4 pb-4">
                                        <p className="text-lg md:text-xl text-white/70 leading-relaxed font-medium">
                                            Representamos el extremo superior del rango técnico (0-1.200 m s. n. m.), generando un microclima de origen único.
                                        </p>
                                    </div>
                                </div>
                                
                                <div className="grid md:grid-cols-3 gap-8">
                                    {[
                                        { title: "Ancestralidad", desc: "No es adorno, es continuidad botánica. Policultivos y manejo de sombra agroforestal.", icon: "users" },
                                        { title: "Espiritualidad", desc: "El cacao como planta ligada al alma femenina, elegida por Sibö en la cosmovisión Bribri.", icon: "shield-check" },
                                        { title: "Regeneración", desc: "Sistemas multiestrato que replican la lógica de los pueblos originarios.", icon: "leaf" }
                                    ].map((item, i) => (
                                        <motion.div key={i} whileHover={{ y: -10 }} className="p-10 bg-white/5 backdrop-blur-xl border border-white/10 rounded-[3rem] group hover:bg-white hover:text-cacao-purple transition-all duration-500">
                                            <Icon name={item.icon} size={48} className="text-cacao-orange mb-8 group-hover:text-cacao-pink" />
                                            <h4 className="text-2xl font-black mb-4 uppercase tracking-tighter">{item.title}</h4>
                                            <p className="text-white/60 group-hover:text-stone-600 font-medium leading-snug">{item.desc}</p>
                                        </motion.div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* PRODUCTO / SECCION 03 */}
                        <section className="py-40 bg-cacao-blue text-white relative overflow-hidden">
                            <div className="container mx-auto px-6">
                                <div className="grid lg:grid-cols-12 gap-24 items-center">
                                    <div className="lg:col-span-6 relative flex justify-center order-2 lg:order-1">
                                        <motion.img 
                                            initial={{ rotate: -5, y: 50, opacity: 0 }}
                                            whileInView={{ rotate: 0, y: 0, opacity: 1 }}
                                            transition={{ duration: 1 }}
                                            src="https://raw.githubusercontent.com/RoninGangStudio/AnandamayaFincadeCacao/main/foto3.png" 
                                            className="max-h-[800px] w-auto drop-shadow-[0_50px_50px_rgba(0,0,0,0.6)]" 
                                            alt="Jugo de Cacao"
                                        />
                                        <div className="absolute bottom-0 w-full h-20 bg-black/20 blur-3xl -z-10" />
                                    </div>
                                    <div className="lg:col-span-6 order-1 lg:order-2">
                                        <SectionLabel color="text-cacao-pink">Capa 03: Innovación Circular</SectionLabel>
                                        <h2 className="text-6xl md:text-8xl lg:text-[10vw] font-black leading-[0.85] tracking-tighter uppercase mb-10">
                                            JUGO DE<br /><span className="text-cacao-pink">CACAO.</span>
                                        </h2>
                                        <p className="text-xl md:text-2xl font-serif italic text-white/80 mb-10 leading-relaxed">
                                            "Transformamos la pulpa fresca antes de la fermentación en una bebida tropical con notas aromáticas únicas."
                                        </p>
                                        <div className="space-y-8 mb-16">
                                            <div className="flex gap-6 items-start">
                                                <div className="w-12 h-12 bg-cacao-pink flex-shrink-0 rounded-full flex items-center justify-center">
                                                    <Icon name="sparkles" size={24} />
                                                </div>
                                                <div>
                                                    <h5 className="text-xl font-black uppercase mb-1">Sin Desperdicio</h5>
                                                    <p className="text-white/60 font-medium">Aprovechamiento integral de la "baba" o pulpa del fruto.</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-6 items-start">
                                                <div className="w-12 h-12 bg-cacao-orange flex-shrink-0 rounded-full flex items-center justify-center">
                                                    <Icon name="zap" size={24} />
                                                </div>
                                                <div>
                                                    <h5 className="text-xl font-black uppercase mb-1">Energía Viva</h5>
                                                    <p className="text-white/60 font-medium">Potencial antioxidante y sabor tropical sin igual.</p>
                                                </div>
                                            </div>
                                        </div>
                                        <button className="px-12 py-6 bg-cacao-pink text-white font-black text-xl uppercase tracking-widest hover:bg-white hover:text-cacao-blue transition-all duration-500 rounded-full shadow-2xl flex items-center gap-6">
                                            PEDIR AHORA <Icon name="arrow-right" />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* EXPERIENCIA SECTION */}
                        <section className="bg-stone-100 py-40 overflow-hidden">
                            <div className="container mx-auto px-6">
                                <div className="max-w-4xl mb-16 md:mb-24">
                                    <SectionLabel>Inmersión</SectionLabel>
                                    <h2 className="text-5xl md:text-7xl lg:text-8xl font-black uppercase tracking-tighter leading-[0.9] mb-8 text-cacao-black">
                                        SENTIR EL<br /><span className="text-cacao-blue">ARCHIVO VIVO.</span>
                                    </h2>
                                    <p className="text-lg md:text-xl lg:text-2xl font-medium text-stone-500 leading-relaxed uppercase">
                                        Momentos de calma, fuego ritual y senderos de bambú en un entorno de arquitectura orgánica inmersiva.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="md:col-span-2 aspect-[16/9] bg-stone-200 rounded-3xl overflow-hidden archive-card">
                                        <img src="https://raw.githubusercontent.com/RoninGangStudio/AnandamayaFincadeCacao/main/foto4.png" className="w-full h-full object-cover" alt="Organic Arch" />
                                    </div>
                                    <div className="aspect-square bg-stone-200 rounded-3xl overflow-hidden archive-card">
                                        <img src="https://raw.githubusercontent.com/RoninGangStudio/AnandamayaFincadeCacao/main/foto5.png" className="w-full h-full object-cover rotate-90" alt="Detail" />
                                    </div>
                                    <div className="aspect-square bg-stone-200 rounded-3xl overflow-hidden archive-card">
                                        <img src="https://raw.githubusercontent.com/RoninGangStudio/AnandamayaFincadeCacao/main/foto6.png" className="w-full h-full object-cover" alt="Detail 2" />
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* MARKETING / AUDIENCIA */}
                        <section className="py-40 bg-white">
                            <div className="container mx-auto px-6">
                                <div className="grid lg:grid-cols-3 gap-12">
                                    <div className="p-12 border-t-8 border-cacao-blue">
                                        <Icon name="globe" size={40} className="mb-8 text-cacao-blue" />
                                        <h4 className="text-3xl font-black uppercase mb-6">Internacional</h4>
                                        <p className="text-stone-500 font-medium leading-relaxed">Experiencias vivenciales de patrimonio y sostenibilidad profunda.</p>
                                    </div>
                                    <div className="p-12 border-t-8 border-cacao-pink">
                                        <Icon name="map-pin" size={40} className="mb-8 text-cacao-pink" />
                                        <h4 className="text-3xl font-black uppercase mb-6">Regional</h4>
                                        <p className="text-stone-500 font-medium leading-relaxed">Turismo nacional enfocado en bienestar y recreación outdoor.</p>
                                    </div>
                                    <div className="p-12 border-t-8 border-cacao-orange">
                                        <Icon name="briefcase" size={40} className="mb-8 text-cacao-orange" />
                                        <h4 className="text-3xl font-black uppercase mb-6">Corporativo</h4>
                                        <p className="text-stone-500 font-medium leading-relaxed">Programas de bienestar y hospitalidad empresarial (Free Zone specialists).</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* TICKER */}
                        <div className="py-12 bg-cacao-pink text-white flex border-y-8 border-cacao-blue overflow-hidden italic">
                            <motion.div animate={{ x: [0, -1000] }} transition={{ repeat: Infinity, duration: 20, ease: "linear" }} className="flex gap-20 whitespace-nowrap text-6xl font-black uppercase tracking-tighter">
                                <span>Innovación Circular • Uxarrací Archive • Cacao de Altura 1200m • Tsuru • Sibö • Policultivos • Agroecología • Hospitalidad •</span>
                                <span>Innovación Circular • Uxarrací Archive • Cacao de Altura 1200m • Tsuru • Sibö • Policultivos • Agroecología • Hospitalidad •</span>
                            </motion.div>
                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer className="bg-cacao-black text-white pt-60 pb-20 px-6 relative overflow-hidden">
                        <div className="container mx-auto">
                            <div className="grid lg:grid-cols-2 gap-40 mb-40">
                                <div>
                                    <Logo className="w-16 h-16 md:w-24 md:h-24 mb-12 md:mb-16 bg-white rounded-full p-2" />
                                    <h2 className="text-[14vw] md:text-[10vw] font-black leading-[0.8] tracking-tighter mb-10 md:mb-12 uppercase">
                                        FIN DE <br /><span className="text-cacao-orange">COSECHA.</span>
                                    </h2>
                                    <div className="flex flex-col sm:flex-row gap-4 md:gap-6">
                                        <button className="px-8 md:px-10 py-4 md:py-5 bg-cacao-pink rounded-full font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all text-sm md:text-base">Reservar</button>
                                        <button className="px-8 md:px-10 py-4 md:py-5 border-2 border-white rounded-full font-black uppercase tracking-widest hover:bg-white hover:text-black transition-all text-sm md:text-base">Contacto</button>
                                    </div>
                                </div>
                                <div className="flex flex-col justify-end space-y-10 md:space-y-12">
                                    <div>
                                        <p className="font-mono text-[9px] md:text-[10px] uppercase text-cacao-orange mb-3 md:mb-4 font-black">Mundo Corporativo</p>
                                        <p className="text-xl md:text-3xl font-serif italic text-white/60">Bienestar para equipos de tecnología y dispositivos médicos (La Lima Free Zone).</p>
                                    </div>
                                    <div>
                                        <p className="font-mono text-[9px] md:text-[10px] uppercase text-cacao-pink mb-3 md:mb-4 font-black">Ubicación</p>
                                        <p className="text-xl md:text-3xl font-serif italic text-white">Ujarrás, Cartago • Costa Rica.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row justify-between items-center border-t border-white/10 pt-20">
                                <p className="font-mono text-[10px] uppercase tracking-widest opacity-40 mb-4 md:mb-0">© 2024 Anandamaya Finca de Cacao • Uxarrací Archive</p>
                                <div className="flex gap-8 font-black uppercase text-[10px] tracking-widest text-cacao-pink">
                                    <a href="#" className="hover:text-white transition-colors">Instagram</a>
                                    <a href="#" className="hover:text-white transition-colors">LinkedIn</a>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
